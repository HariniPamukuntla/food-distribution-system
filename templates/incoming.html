{% extends "base.html" %}

{% block content %}
<h2>Incoming Requests</h2>

<div class="table-box">
<table>
<tr>
<th>ID</th><th>Food</th><th>Qty</th><th>Location</th><th>Status</th><th>Action</th>
</tr>

{% for r in data %}
<tr>
<td>A-{{r.id}}</td>
<td>{{r.food}}</td>
<td>{{r.qty}}</td>
<td>{{r.location}}</td>
<td>{{r.status}}</td>
<td>
<a href="/accept/{{r.id}}"><button class="btn accept">Accept</button></a>
<a href="/reject/{{r.id}}"><button class="btn reject">Reject</button></a>
</td>
</tr>
{% endfor %}

</table>
</div>

{% endblock %}
